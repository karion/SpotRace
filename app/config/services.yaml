parameters:
    app.allowed_email_domains: '%env(string:ALLOWED_EMAIL_DOMAINS)%'
    app.mailer_from: '%env(string:MAILER_FROM)%'
    app.reservation.confirmation_deadline_hour: '%env(int:RESERVATION_CONFIRMATION_DEADLINE_HOUR)%'
    app.reservation.assigned_window_days: '%env(int:RESERVATION_ASSIGNED_WINDOW_DAYS)%'
    app.reservation.free_window_days: '%env(int:RESERVATION_FREE_WINDOW_DAYS)%'
    app.reservation.timezone: '%env(string:APP_TIMEZONE)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\Controller\AuthController:
        arguments:
            $allowedEmailDomains: '%app.allowed_email_domains%'
            $mailerFrom: '%app.mailer_from%'

    App\Service\ReservationPolicy:
        arguments:
            $confirmationDeadlineHour: '%app.reservation.confirmation_deadline_hour%'
            $assignedWindowDays: '%app.reservation.assigned_window_days%'
            $freeReservationWindowDays: '%app.reservation.free_window_days%'
            $timezone: '%app.reservation.timezone%'
