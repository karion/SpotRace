services:
  frankenphp:
    image: dunglas/frankenphp:1-php8.3
    container_name: spotrace_frankenphp
    working_dir: /app
    command: ["php-server", "--root", "public", "--listen", ":80"]
    ports:
      - "8080:80"
    volumes:
      - ./app:/app
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      MAILER_DSN: smtp://mailhog:1025
      MAILER_FROM: no-reply@spotrace.local
    depends_on:
      - mysql
      - mailhog

  mysql:
    image: mysql:8.0
    container_name: spotrace_mysql
    environment:
      MYSQL_DATABASE: app
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog:latest
    container_name: spotrace_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  composer:
    image: composer:2
    container_name: spotrace_composer
    working_dir: /app
    volumes:
      - ./app:/app
    entrypoint: ["composer"]

volumes:
  mysql_data:
