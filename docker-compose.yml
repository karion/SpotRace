services:
  frankenphp:
    image: dunglas/frankenphp:1-php8.3
    container_name: spotrace_frankenphp
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /app
    ports:
      - "8080:80"
    volumes:
      - ./app:/app
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      SERVER_NAME: :80
    depends_on:
      - mysql
      - mailhog

  mysql:
    image: mysql:8.0
    container_name: spotrace_mysql
    environment:
      MYSQL_DATABASE: app
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog:latest
    container_name: spotrace_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
